template_id: agreement_desk_triage
required_fields:
  - contract_type
  - paper_type
  - triage_result
  - unfavorable_terms
  - recommended_action
allowed_values:
  paper_type:
    - 1PP
    - 3PP
    - Unknown
  triage_result:
    - GREEN
    - YELLOW
    - RED
triage_definitions:
  GREEN: No material exceptions found based on the provided playbook or review criteria.
  YELLOW: Exceptions found that require targeted review or business/legal confirmation.
  RED: Material issue, prohibited position, missing critical term, or high-risk language requiring escalation.
array_fields:
  unfavorable_terms:
    required_when:
      triage_result:
        - YELLOW
        - RED
    allowed_empty_when:
      triage_result:
        - GREEN
unfavorable_term_required_fields:
  - term_name
  - extracted_language
  - risk_reason
  - playbook_position
  - suggested_fallback
  - escalation_owner
recommended_action_required_fields:
  - action
  - owner
  - rationale
  - next_step
missing_information_phrase: Not found in agreement
generic_action_phrases:
  - manual review required
  - review required
  - needs review
  - check with legal
  - follow up
hallucination_watch_terms:
  - payment
  - notice
  - renewal
  - termination
  - indemnity
  - liability
business_quality_categories:
  - Specificity
  - Actionability
  - Audience fit
  - Workflow readiness
  - Evidence quality
  - Risk clarity
  - Formatting clarity
  - Demo usefulness
